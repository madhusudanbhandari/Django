<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .form-container{
            width: 300px;
            margin: 60px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }
    </style>

<body>
    <h1 style="text-align: center;">Please register</h1>
    <div class="form-container">
        
    <form action="" method="POST">
        {% csrf_token %}

        {% for field in form %}
        <div>
            <label for="">{{ field.label }}</label>
            <input type="{{field.field.widget.input_type}}" name="{{field.name}}" value="{{field.value}}">
        </div>
        {% endfor %}

        <button type="submit">Register</button>
    </form>
    </div>
</body>
</html>
